<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Notas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── Hide number input spinners ── */
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }

  :root {
    --blue-50:  #EBF5FF;
    --blue-100: #DBEEFF;
    --blue-200: #B8DAFF;
    --blue-300: #82BAED;
    --blue-400: #4A90D9;
    --blue-500: #2B7FCC;
    --blue-600: #1A5FA0;
    --blue-700: #0F4278;
    --green:    #27AE60;
    --green-light: #E8F8EF;
    --red:      #E74C3C;
    --red-light: #FDEDEC;
    --yellow:   #F39C12;
    --yellow-light: #FEF9E7;
    --purple:   #8E44AD;
    --purple-light: #F5EEF8;
    --gray-50:  #F8FAFC;
    --gray-100: #F1F5F9;
    --gray-200: #E2E8F0;
    --gray-300: #CBD5E1;
    --gray-400: #94A3B8;
    --gray-500: #64748B;
    --gray-600: #475569;
    --gray-700: #334155;
    --gray-800: #1E293B;
    --white:    #FFFFFF;
    --radius:   12px;
    --radius-sm: 8px;
    --shadow:   0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(43,127,204,.08);
    --shadow-hover: 0 4px 12px rgba(43,127,204,.15), 0 8px 32px rgba(43,127,204,.10);
  }

  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(160deg, #EBF5FF 0%, #F0F8FF 50%, #E8F3FB 100%);
    min-height: 100vh;
    color: var(--gray-800);
    font-size: 14px;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, var(--blue-600) 0%, var(--blue-500) 60%, var(--blue-400) 100%);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 20px rgba(26,95,160,.30);
    position: relative;
    overflow: hidden;
  }
  header::before {
    content:''; position:absolute; inset:0;
    background: radial-gradient(ellipse 60% 120% at 90% 50%, rgba(255,255,255,.08) 0%, transparent 70%);
    pointer-events:none;
  }
  .header-icon {
    width:44px; height:44px;
    background: rgba(255,255,255,.18);
    border-radius: 12px;
    display:flex; align-items:center; justify-content:center;
    font-size:20px; flex-shrink:0;
    backdrop-filter: blur(6px);
    border:1px solid rgba(255,255,255,.25);
  }
  header h1 { font-size:20px; font-weight:700; color:#fff; letter-spacing:-.3px; }
  header p  { font-size:12px; color:rgba(255,255,255,.75); margin-top:2px; }

  /* Mobile summary strip in header */
  .header-summary {
    margin-left: auto;
    display: none;
    gap: 12px;
    align-items: center;
  }
  .header-stat {
    text-align:center;
    background: rgba(255,255,255,.15);
    border-radius: 8px;
    padding: 6px 12px;
    border: 1px solid rgba(255,255,255,.2);
  }
  .header-stat .hs-label { font-size:10px; color:rgba(255,255,255,.7); font-weight:600; text-transform:uppercase; letter-spacing:.05em; }
  .header-stat .hs-value { font-size:18px; font-weight:700; color:#fff; line-height:1.1; font-variant-numeric:tabular-nums; }

  /* ── LAYOUT ── */
  .app { display:flex; gap:0; min-height: calc(100vh - 80px); }

  /* ── SIDEBAR ── */
  .sidebar {
    width:256px; flex-shrink:0;
    background: var(--white);
    border-right:1px solid var(--gray-200);
    padding:24px 18px;
    display:flex; flex-direction:column; gap:16px;
    position:sticky; top:0; height:calc(100vh - 80px); overflow-y:auto;
    box-shadow: 2px 0 12px rgba(43,127,204,.06);
  }
  .sidebar-title {
    font-size:10px; font-weight:700; letter-spacing:.1em;
    text-transform:uppercase; color:var(--gray-400); padding-bottom:8px;
    border-bottom:1px solid var(--gray-100);
  }

  .stat-card {
    background: var(--blue-50);
    border:1px solid var(--blue-200);
    border-radius: var(--radius-sm);
    padding:12px 14px;
  }
  .stat-card .label { font-size:10px; font-weight:700; color:var(--blue-500); text-transform:uppercase; letter-spacing:.06em; }
  .stat-card .value { font-size:30px; font-weight:700; color:var(--blue-600); line-height:1.1; margin-top:2px; font-variant-numeric:tabular-nums; }
  .stat-card .sub   { font-size:11px; color:var(--blue-400); margin-top:2px; }

  .prom-card {
    border-radius: var(--radius-sm);
    padding:12px 14px;
    background: var(--gray-50);
    border:1px solid var(--gray-200);
  }
  .prom-card .label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--gray-500); }
  .prom-card .value { font-size:26px; font-weight:700; line-height:1.1; margin-top:2px; font-variant-numeric:tabular-nums; }
  .prom-card .sub-val { font-size:12px; font-weight:500; margin-top:3px; }
  .prom-card.pass  { background:var(--green-light); border-color:#A9DFBF; }
  .prom-card.pass .value { color:var(--green); }
  .prom-card.fail  { background:var(--red-light); border-color:#F5B7B1; }
  .prom-card.fail .value { color:var(--red); }
  .prom-card.warn  { background:var(--yellow-light); border-color:#FAD7A0; }
  .prom-card.warn .value { color:var(--yellow); }

  .sidebar-list { display:flex; flex-direction:column; gap:5px; }
  .sidebar-ramo {
    display:flex; justify-content:space-between; align-items:center;
    padding:7px 10px; border-radius:6px;
    font-size:12px; cursor:pointer; transition:background .15s;
    color:var(--gray-600);
  }
  .sidebar-ramo:hover { background:var(--blue-50); color:var(--blue-600); }
  .sidebar-ramo .sr-name { font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:120px; }
  .sidebar-ramo .sr-grades { display:flex; flex-direction:column; align-items:flex-end; gap:1px; }
  .sidebar-ramo .ramo-grade {
    font-weight:700; font-size:12px; font-variant-numeric:tabular-nums;
    padding:1px 6px; border-radius:4px;
  }
  .sidebar-ramo .real-grade {
    font-size:10px; font-variant-numeric:tabular-nums;
    padding:1px 4px; border-radius:3px; opacity:.8;
  }
  .grade-pass { background:var(--green-light); color:var(--green); }
  .grade-fail { background:var(--red-light); color:var(--red); }
  .grade-warn { background:var(--yellow-light); color:var(--yellow); }
  .grade-none { background:var(--gray-100); color:var(--gray-400); }

  /* ── MAIN ── */
  .main {
    flex:1; padding:28px 32px;
    display:flex; flex-direction:column; gap:18px;
    max-width:920px;
  }

  .add-ramo-btn {
    display:flex; align-items:center; justify-content:center; gap:10px;
    padding:14px 20px; border-radius: var(--radius);
    background: var(--white);
    border:2px dashed var(--blue-300);
    color:var(--blue-500); font-size:14px; font-weight:600;
    cursor:pointer; transition:all .2s;
    font-family:'Inter',sans-serif;
    width:100%;
  }
  .add-ramo-btn:hover { background:var(--blue-50); border-color:var(--blue-400); color:var(--blue-600); transform:translateY(-1px); }

  /* ── RAMO CARD ── */
  .ramo-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border:1px solid var(--gray-200);
    overflow:hidden;
    transition:box-shadow .2s;
    position:relative;
  }
  .ramo-card:hover { box-shadow: var(--shadow-hover); }
  .ramo-card::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:4px;
    background: var(--blue-300); transition:background .3s;
  }
  .ramo-card.pass-card::before { background: var(--green); }
  .ramo-card.fail-card::before { background: var(--red); }
  .ramo-card.warn-card::before { background: var(--yellow); }

  .ramo-header {
    display:flex; align-items:center; gap:10px;
    padding:14px 16px 14px 20px;
    cursor:pointer; user-select:none;
    transition:background .15s;
  }
  .ramo-header:hover { background:var(--gray-50); }
  .ramo-toggle { color:var(--gray-400); font-size:14px; transition:transform .2s; flex-shrink:0; }
  .ramo-toggle.open { transform:rotate(90deg); }

  .ramo-name-input {
    flex:1; font-size:15px; font-weight:700; color:var(--gray-800);
    border:none; outline:none; background:transparent;
    font-family:'Inter',sans-serif; min-width:0;
  }
  .ramo-name-input::placeholder { color:var(--gray-300); }

  .ramo-header-badges { display:flex; align-items:center; gap:8px; flex-shrink:0; }

  .credits-wrap { display:flex; align-items:center; gap:5px; }
  .credits-label { font-size:11px; color:var(--gray-400); font-weight:500; white-space:nowrap; }
  .credits-input {
    width:42px; text-align:center; font-weight:700; font-size:13px;
    color:var(--blue-600); background:var(--blue-50); border:1px solid var(--blue-200);
    border-radius:6px; padding:4px 4px; font-family:'Inter',sans-serif;
    outline:none; transition:border .15s; font-variant-numeric:tabular-nums;
  }
  .credits-input:focus { border-color:var(--blue-400); }

  /* Grade badges in ramo header – stacked */
  .ramo-grades-stack { display:flex; flex-direction:column; align-items:center; gap:2px; }
  .ramo-grade-badge {
    font-size:14px; font-weight:700; padding:3px 10px; border-radius:16px;
    font-variant-numeric:tabular-nums; min-width:52px; text-align:center;
    transition:all .3s;
  }
  .ramo-grade-real {
    font-size:10px; font-weight:600; padding:1px 6px; border-radius:10px;
    font-variant-numeric:tabular-nums; text-align:center;
    background:var(--gray-100); color:var(--gray-500);
    white-space:nowrap;
  }

  .delete-ramo-btn {
    background:none; border:none; cursor:pointer;
    color:var(--gray-300); font-size:17px; line-height:1;
    padding:5px; border-radius:4px; transition:color .15s, background .15s;
    flex-shrink:0;
  }
  .delete-ramo-btn:hover { color:var(--red); background:var(--red-light); }

  /* ── RAMO BODY ── */
  .ramo-body { padding:0 16px 18px; display:none; }
  .ramo-body.open { display:block; }

  /* ── PERCENT WARNING ── */
  .pct-warning {
    display:none; align-items:center; gap:6px;
    padding:7px 10px; border-radius:6px; margin-bottom:10px;
    font-size:12px; font-weight:500;
  }
  .pct-warning.show { display:flex; }
  .pct-warning.over  { background:var(--red-light);    color:var(--red);    border:1px solid #F5B7B1; }
  .pct-warning.under { background:var(--yellow-light); color:var(--yellow); border:1px solid #FAD7A0; }
  .pct-warning.ok    { background:var(--green-light);  color:var(--green);  border:1px solid #A9DFBF; display:flex; }

  /* ── EVAL LIST ── */
  .eval-list { display:flex; flex-direction:column; gap:6px; }

  /* ── EVAL ROW ── */
  .eval-row {
    display:flex; align-items:stretch; gap:0;
    border-radius: var(--radius-sm);
    border:1px solid var(--gray-200);
    overflow:hidden;
    background:var(--white);
    transition:box-shadow .15s;
  }
  .eval-row:hover { box-shadow:0 2px 8px rgba(43,127,204,.10); }

  .eval-type-bar { width:4px; flex-shrink:0; background:var(--blue-300); }
  .eval-type-bar.sub { background:var(--blue-200); }
  .eval-type-bar.grouped { background:#9B59B6; }

  .eval-content { flex:1; display:flex; align-items:center; gap:0; min-width:0; }

  /* Drag handle */
  .drag-handle {
    padding:0 6px; cursor:grab; color:var(--gray-300);
    font-size:14px; display:flex; align-items:center;
    flex-shrink:0; border-right:1px solid var(--gray-100);
    user-select:none; transition:color .15s;
    touch-action: none;
  }
  .drag-handle:hover { color:var(--gray-500); }
  .drag-handle:active { cursor:grabbing; }

  /* Order buttons */
  .order-btns {
    display:flex; flex-direction:column; gap:0;
    padding:0 2px; flex-shrink:0;
  }
  .order-btn {
    background:none; border:none; cursor:pointer;
    color:var(--gray-300); font-size:11px; line-height:1;
    width:20px; height:18px; border-radius:3px;
    display:flex; align-items:center; justify-content:center;
    transition:color .15s, background .15s;
    padding:0;
  }
  .order-btn:hover { color:var(--blue-500); background:var(--blue-50); }
  .order-btn:disabled { opacity:.2; cursor:default; }
  .order-btn:disabled:hover { background:none; color:var(--gray-300); }

  .eval-name-wrap { flex:1; padding:9px 10px; display:flex; align-items:center; gap:6px; min-width:0; }
  .eval-indent { flex-shrink:0; color:var(--gray-300); font-size:12px; }

  .eval-name-input {
    flex:1; border:none; outline:none; font-family:'Inter',sans-serif;
    font-size:13px; font-weight:500; color:var(--gray-700); background:transparent;
    min-width:0;
  }
  .eval-name-input::placeholder { color:var(--gray-300); }
  .eval-name-input.sub { font-weight:400; color:var(--gray-500); font-size:12px; }

  .eval-pct-wrap {
    display:flex; align-items:center; gap:3px;
    padding:9px 8px; border-left:1px solid var(--gray-100);
    min-width:72px;
  }
  .eval-pct-input {
    width:38px; text-align:right; border:none; outline:none;
    font-family:'Inter',sans-serif; font-size:13px; font-weight:600;
    color:var(--blue-600); background:transparent;
    font-variant-numeric:tabular-nums;
  }
  .eval-pct-symbol { color:var(--gray-400); font-size:11px; font-weight:500; }

  .eval-grade-wrap {
    display:flex; align-items:center; gap:4px;
    padding:9px 8px; border-left:1px solid var(--gray-100);
    min-width:88px;
  }
  .grade-label { font-size:10px; color:var(--gray-400); white-space:nowrap; }
  .eval-grade-input {
    width:40px; text-align:center; border:none; outline:none;
    font-family:'Inter',sans-serif; font-size:14px; font-weight:700;
    color:var(--gray-700); background:transparent;
    font-variant-numeric:tabular-nums;
    border-bottom:2px solid var(--gray-200); transition:border .15s;
  }
  .eval-grade-input:focus { border-color:var(--blue-400); }
  .eval-grade-computed {
    font-size:13px; font-weight:700; color:var(--blue-500);
    font-variant-numeric:tabular-nums; padding:2px 0;
  }

  .eval-actions {
    display:flex; align-items:center; gap:1px;
    padding:4px 6px; border-left:1px solid var(--gray-100);
    flex-shrink:0;
  }
  .eval-action-btn {
    background:none; border:none; cursor:pointer;
    color:var(--gray-300); font-size:15px; line-height:1;
    width:26px; height:26px; border-radius:4px;
    display:flex; align-items:center; justify-content:center;
    transition:color .15s, background .15s;
    font-family:'Inter',sans-serif; flex-shrink:0;
  }
  .eval-action-btn:hover.del   { color:var(--red);      background:var(--red-light); }
  .eval-action-btn:hover.add-s { color:var(--blue-500); background:var(--blue-50); }

  /* ── SUB-ITEMS ── */
  .sub-items { margin-top:3px; display:flex; flex-direction:column; gap:3px; padding-left:12px; }

  /* ── ADD EVAL BUTTONS ── */
  .add-eval-btns { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  .add-eval-btn {
    display:flex; align-items:center; gap:6px;
    padding:7px 10px; border-radius:6px;
    background:none; border:1px dashed var(--gray-300);
    color:var(--gray-400); font-size:12px; font-weight:500;
    cursor:pointer; transition:all .15s; font-family:'Inter',sans-serif;
    flex:1; min-width:140px; justify-content:center;
  }
  .add-eval-btn:hover { border-color:var(--blue-300); color:var(--blue-500); background:var(--blue-50); }
  .add-eval-btn.grouped-btn { color:#8E44AD; border-color:#C39BD3; }
  .add-eval-btn.grouped-btn:hover { background:var(--purple-light); border-color:#9B59B6; }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align:center; padding:24px 16px;
    color:var(--gray-400); font-size:13px;
    border:1px dashed var(--gray-200); border-radius:8px; margin:6px 0;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--gray-200); border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--gray-300); }

  /* ── ANIMATIONS ── */
  .ramo-card { animation: slideIn .22s ease; }
  @keyframes slideIn {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .eval-row { animation: fadeIn .18s ease; }
  @keyframes fadeIn {
    from { opacity:0; transform:translateX(-4px); }
    to   { opacity:1; transform:translateX(0); }
  }

  /* ── DRAGGING STATE ── */
  .eval-dragging { opacity:.4; }
  .eval-drag-over { border-top:2px solid var(--blue-400) !important; }

  /* ════════════════════════════════
     RESPONSIVE – MOBILE
  ════════════════════════════════ */
  @media(max-width:700px) {
    .sidebar { display:none; }
    .header-summary { display:flex; }
    header h1 { font-size:17px; }
    header p  { display:none; }

    .app { display:block; }
    .main { padding:14px 12px; gap:14px; max-width:100%; }

    /* Ramo header stacks on mobile */
    .ramo-header { padding:12px 12px 12px 16px; gap:8px; flex-wrap:wrap; }
    .ramo-name-input { font-size:14px; min-width:120px; }
    .ramo-header-badges { gap:6px; }
    .credits-label { display:none; }
    .credits-input { width:38px; }

    /* Eval rows: tighter on mobile */
    .eval-pct-wrap { min-width:60px; padding:8px 6px; }
    .eval-grade-wrap { min-width:72px; padding:8px 6px; }
    .eval-pct-input { width:32px; font-size:12px; }
    .eval-grade-input { width:34px; font-size:13px; }
    .eval-name-input { font-size:12px; }
    .grade-label { display:none; }

    .add-eval-btns { gap:6px; }
    .add-eval-btn { font-size:11px; padding:6px 8px; min-width:120px; }

    /* Order buttons always visible on touch */
    .order-btn { width:24px; height:20px; }
  }

  @media(max-width:420px) {
    .ramo-grades-stack .ramo-grade-real { display:none; }
    .eval-pct-wrap { min-width:52px; }
    .eval-grade-wrap { min-width:60px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-icon">📚</div>
  <div>
    <h1>Calculadora de Notas</h1>
    <p>Promedio ponderado por ramo y créditos</p>
  </div>
  <!-- Shown only on mobile -->
  <div class="header-summary">
    <div class="header-stat">
      <div class="hs-label">Créditos</div>
      <div class="hs-value" id="m-credits">0</div>
    </div>
    <div class="header-stat">
      <div class="hs-label">Promedio</div>
      <div class="hs-value" id="m-prom">—</div>
    </div>
  </div>
</header>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-title">Resumen</div>

    <div class="stat-card">
      <div class="label">Créditos totales</div>
      <div class="value" id="total-credits">0</div>
      <div class="sub">créditos inscritos</div>
    </div>

    <div class="prom-card" id="prom-ponderado-card">
      <div class="label">Promedio ponderado</div>
      <div class="value" id="prom-ponderado">—</div>
      <div class="sub-val" id="prom-real-sidebar" style="color:var(--gray-400);"></div>
    </div>

    <div class="sidebar-title" style="margin-top:2px;">Ramos</div>
    <div class="sidebar-list" id="sidebar-list">
      <div class="empty-state" style="padding:14px; font-size:12px;">Sin ramos aún</div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="ramos-container">
    <button class="add-ramo-btn" onclick="addRamo()">
      <span style="font-size:18px;line-height:1;">＋</span> Agregar ramo
    </button>
  </main>
</div>

<script>
let ramos = [];
let ramoCounter = 0;
let evalCounter = 0;
let subCounter  = 0;

/* ══════════════════════════════════
   RAMO
══════════════════════════════════ */
function addRamo() {
  const id = ++ramoCounter;
  const ramo = { id, name:'', credits:5, evals:[], open:true };
  ramos.push(ramo);
  renderRamo(ramo);
  updateSidebar();
}

function deleteRamo(id) {
  ramos = ramos.filter(r => r.id !== id);
  document.getElementById(`ramo-${id}`)?.remove();
  updateSidebar();
}

function toggleRamo(id) {
  const r = ramos.find(r => r.id === id);
  if (!r) return;
  r.open = !r.open;
  document.getElementById(`ramo-body-${id}`)?.classList.toggle('open', r.open);
  document.getElementById(`ramo-toggle-${id}`)?.classList.toggle('open', r.open);
}

function renderRamo(ramo) {
  const container = document.getElementById('ramos-container');
  const addBtn    = container.querySelector('.add-ramo-btn');
  const card      = document.createElement('div');
  card.className  = 'ramo-card';
  card.id         = `ramo-${ramo.id}`;

  card.innerHTML = `
    <div class="ramo-header" onclick="toggleRamo(${ramo.id})">
      <span class="ramo-toggle open" id="ramo-toggle-${ramo.id}">▶</span>
      <input class="ramo-name-input" id="ramo-name-${ramo.id}"
        placeholder="Nombre del ramo…" value="${esc(ramo.name)}"
        onclick="event.stopPropagation()"
        oninput="updateRamoName(${ramo.id},this.value)">
      <div class="ramo-header-badges" onclick="event.stopPropagation()">
        <div class="credits-wrap">
          <span class="credits-label">Créditos</span>
          <input class="credits-input" type="number" min="1" max="30"
            value="${ramo.credits}"
            oninput="updateCredits(${ramo.id},this.value)">
        </div>
        <div class="ramo-grades-stack">
          <span class="ramo-grade-badge grade-none" id="ramo-badge-${ramo.id}">—</span>
          <span class="ramo-grade-real" id="ramo-real-${ramo.id}" title="Nota real (notas faltantes = 0)"></span>
        </div>
        <button class="delete-ramo-btn" onclick="deleteRamo(${ramo.id})" title="Eliminar ramo">✕</button>
      </div>
    </div>
    <div class="ramo-body open" id="ramo-body-${ramo.id}">
      <div class="pct-warning" id="pct-warn-${ramo.id}"></div>
      <div class="eval-list" id="eval-list-${ramo.id}"></div>
      <div class="add-eval-btns">
        <button class="add-eval-btn" onclick="addEval(${ramo.id},'simple')">＋ Evaluación simple</button>
        <button class="add-eval-btn grouped-btn" onclick="addEval(${ramo.id},'grouped')">＋ Con subcontroles</button>
      </div>
    </div>`;

  container.insertBefore(card, addBtn);
  updateRamoGrade(ramo.id);
}

function updateRamoName(id, val) {
  const r = ramos.find(r => r.id === id);
  if (r) r.name = val;
  updateSidebar();
}
function updateCredits(id, val) {
  const r = ramos.find(r => r.id === id);
  if (r) { r.credits = parseInt(val) || 0; updateSidebar(); }
}

/* ══════════════════════════════════
   EVAL
══════════════════════════════════ */
function addEval(ramoId, type) {
  const ramo = ramos.find(r => r.id === ramoId);
  if (!ramo) return;
  const eid = ++evalCounter;
  const ev  = { id:eid, type, name:'', pct:0, grade:null, subs:[] };
  ramo.evals.push(ev);
  renderEval(ramoId, ev);
  recalcPcts(ramoId);
  updateRamoGrade(ramoId);
}

function deleteEval(ramoId, evalId) {
  const ramo = ramos.find(r => r.id === ramoId);
  if (!ramo) return;
  ramo.evals = ramo.evals.filter(e => e.id !== evalId);
  document.getElementById(`eval-${evalId}`)?.remove();
  recalcPcts(ramoId);
  updateRamoGrade(ramoId);
  refreshOrderBtns(ramoId);
}

function renderEval(ramoId, ev) {
  const list = document.getElementById(`eval-list-${ramoId}`);
  const wrap = document.createElement('div');
  wrap.id = `eval-${ev.id}`;
  wrap.innerHTML = ev.type === 'simple'
    ? buildSimpleEvalHTML(ramoId, ev)
    : buildGroupedEvalHTML(ramoId, ev);
  list.appendChild(wrap);
  refreshOrderBtns(ramoId);
}

/* ── Order buttons ── */
function moveEval(ramoId, evalId, dir) {
  const ramo = ramos.find(r => r.id === ramoId);
  if (!ramo) return;
  const idx = ramo.evals.findIndex(e => e.id === evalId);
  if (idx < 0) return;
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= ramo.evals.length) return;
  // swap in data
  [ramo.evals[idx], ramo.evals[newIdx]] = [ramo.evals[newIdx], ramo.evals[idx]];
  // swap in DOM
  const list = document.getElementById(`eval-list-${ramoId}`);
  const els  = Array.from(list.children);
  const elA  = document.getElementById(`eval-${evalId}`);
  const elB  = document.getElementById(`eval-${ramo.evals[idx].id}`);
  if (!elA || !elB) return;
  if (dir === -1) list.insertBefore(elA, elB);
  else            list.insertBefore(elB, elA);
  refreshOrderBtns(ramoId);
}

function refreshOrderBtns(ramoId) {
  const ramo = ramos.find(r => r.id === ramoId);
  if (!ramo) return;
  ramo.evals.forEach((ev, idx) => {
    const upBtn  = document.getElementById(`eval-up-${ev.id}`);
    const downBtn= document.getElementById(`eval-dn-${ev.id}`);
    if (upBtn)   upBtn.disabled   = idx === 0;
    if (downBtn) downBtn.disabled = idx === ramo.evals.length - 1;
  });
}

/* ── Build HTML ── */
function orderBtnsHTML(ramoId, evalId) {
  return `<div class="order-btns">
    <button class="order-btn" id="eval-up-${evalId}" onclick="event.stopPropagation();moveEval(${ramoId},${evalId},-1)" title="Subir">▲</button>
    <button class="order-btn" id="eval-dn-${evalId}" onclick="event.stopPropagation();moveEval(${ramoId},${evalId},1)"  title="Bajar">▼</button>
  </div>`;
}

function buildSimpleEvalHTML(ramoId, ev) {
  return `
    <div class="eval-row" id="eval-row-${ev.id}">
      <div class="eval-type-bar"></div>
      <div class="eval-content">
        ${orderBtnsHTML(ramoId, ev.id)}
        <div class="eval-name-wrap">
          <input class="eval-name-input" placeholder="Nombre evaluación…"
            value="${esc(ev.name)}"
            oninput="updateEvalField(${ramoId},${ev.id},'name',this.value)">
        </div>
        <div class="eval-pct-wrap">
          <input class="eval-pct-input" id="epct-${ev.id}" type="number" min="0" max="100" step="0.5"
            value="${ev.pct || ''}" placeholder="0"
            oninput="updateEvalPct(${ramoId},${ev.id},this.value)">
          <span class="eval-pct-symbol">%</span>
        </div>
        <div class="eval-grade-wrap">
          <span class="grade-label">Nota</span>
          <input class="eval-grade-input" type="number" min="10" max="70" step="1"
            value="${ev.grade !== null ? ev.grade : ''}" placeholder="—"
            oninput="updateEvalGrade(${ramoId},${ev.id},this.value)">
        </div>
        <div class="eval-actions">
          <button class="eval-action-btn del" onclick="deleteEval(${ramoId},${ev.id})" title="Eliminar">✕</button>
        </div>
      </div>
    </div>`;
}

function buildGroupedEvalHTML(ramoId, ev) {
  return `
    <div id="eval-group-${ev.id}">
      <div class="eval-row" style="border-bottom:none;border-radius:8px 8px 0 0;">
        <div class="eval-type-bar grouped"></div>
        <div class="eval-content">
          ${orderBtnsHTML(ramoId, ev.id)}
          <div class="eval-name-wrap">
            <input class="eval-name-input" placeholder="Nombre grupo (ej: Talleres)…"
              value="${esc(ev.name)}"
              oninput="updateEvalField(${ramoId},${ev.id},'name',this.value)">
          </div>
          <div class="eval-pct-wrap">
            <input class="eval-pct-input" id="epct-${ev.id}" type="number" min="0" max="100" step="0.5"
              value="${ev.pct || ''}" placeholder="0"
              oninput="updateEvalPct(${ramoId},${ev.id},this.value)">
            <span class="eval-pct-symbol">%</span>
          </div>
          <div class="eval-grade-wrap" style="min-width:96px;">
            <span class="grade-label">Prom.</span>
            <span class="eval-grade-computed" id="group-avg-${ev.id}">—</span>
          </div>
          <div class="eval-actions">
            <button class="eval-action-btn add-s" onclick="addSubEval(${ramoId},${ev.id})" title="Agregar subcontrol" style="font-size:17px;">＋</button>
            <button class="eval-action-btn del"   onclick="deleteEval(${ramoId},${ev.id})" title="Eliminar grupo">✕</button>
          </div>
        </div>
      </div>
      <div class="sub-items" id="subs-${ev.id}"></div>
      <div style="padding:4px 10px 7px 10px;background:var(--gray-50);border:1px solid var(--gray-200);border-top:none;border-radius:0 0 8px 8px;">
        <span style="font-size:11px;color:var(--gray-400);" id="sub-info-${ev.id}">Sin subcontroles aún</span>
      </div>
    </div>`;
}

/* ══════════════════════════════════
   SUB-EVAL
══════════════════════════════════ */
function addSubEval(ramoId, evalId) {
  const ramo = ramos.find(r => r.id === ramoId);
  const ev   = ramo?.evals.find(e => e.id === evalId);
  if (!ev) return;
  const sid = ++subCounter;
  const sub = { id:sid, name:'', grade:null };
  ev.subs.push(sub);
  const subList = document.getElementById(`subs-${evalId}`);
  const subEl   = document.createElement('div');
  subEl.id      = `sub-${sid}`;
  subEl.innerHTML = buildSubHTML(ramoId, evalId, sub, ev.subs.length);
  subList.appendChild(subEl);
  recalcSubPcts(ramoId, evalId);
  updateGroupAvg(ramoId, evalId);
  updateRamoGrade(ramoId);
}

function buildSubHTML(ramoId, evalId, sub, idx) {
  return `
    <div class="eval-row" style="border-radius:0;border-top:none;" id="sub-row-${sub.id}">
      <div class="eval-type-bar sub"></div>
      <div class="eval-content">
        <div class="eval-name-wrap">
          <span class="eval-indent">└</span>
          <input class="eval-name-input sub" id="sub-name-${sub.id}"
            placeholder="Subcontrol ${idx}…" value="${esc(sub.name)}"
            oninput="updateSubField(${ramoId},${evalId},${sub.id},'name',this.value)">
        </div>
        <div class="eval-pct-wrap">
          <span id="sub-pct-${sub.id}" style="width:38px;text-align:right;font-size:12px;font-weight:600;color:var(--gray-400);font-variant-numeric:tabular-nums;">—</span>
          <span class="eval-pct-symbol">%</span>
        </div>
        <div class="eval-grade-wrap">
          <span class="grade-label">Nota</span>
          <input class="eval-grade-input" type="number" min="10" max="70" step="1"
            value="${sub.grade !== null ? sub.grade : ''}" placeholder="—"
            oninput="updateSubGrade(${ramoId},${evalId},${sub.id},this.value)">
        </div>
        <div class="eval-actions">
          <button class="eval-action-btn del" onclick="deleteSub(${ramoId},${evalId},${sub.id})" title="Eliminar">✕</button>
        </div>
      </div>
    </div>`;
}

function deleteSub(ramoId, evalId, subId) {
  const ramo = ramos.find(r => r.id === ramoId);
  const ev   = ramo?.evals.find(e => e.id === evalId);
  if (!ev) return;
  ev.subs = ev.subs.filter(s => s.id !== subId);
  document.getElementById(`sub-${subId}`)?.remove();
  recalcSubPcts(ramoId, evalId);
  updateGroupAvg(ramoId, evalId);
  updateRamoGrade(ramoId);
}

function recalcSubPcts(ramoId, evalId) {
  const ramo = ramos.find(r => r.id === ramoId);
  const ev   = ramo?.evals.find(e => e.id === evalId);
  if (!ev) return;
  const n = ev.subs.length;
  const subPct = n > 0 ? (ev.pct / n) : 0;
  ev.subs.forEach(s => {
    s.pct = subPct;
    const el = document.getElementById(`sub-pct-${s.id}`);
    if (el) el.textContent = n > 0 ? fmt1(subPct) : '—';
  });
  const info = document.getElementById(`sub-info-${evalId}`);
  if (info) info.textContent = n === 0
    ? 'Sin subcontroles aún'
    : `${n} subcontrol${n>1?'es':''} · ${fmt1(subPct)}% cada uno`;
}

function updateGroupAvg(ramoId, evalId) {
  const ramo = ramos.find(r => r.id === ramoId);
  const ev   = ramo?.evals.find(e => e.id === evalId);
  if (!ev) return;
  const withGrades = ev.subs.filter(s => s.grade !== null);
  const el = document.getElementById(`group-avg-${evalId}`);
  if (!el) return;
  if (withGrades.length === 0) { el.textContent = '—'; el.style.color='var(--blue-500)'; return; }
  const avg = withGrades.reduce((a,s)=>a+s.grade,0)/withGrades.length;
  el.textContent = fmt1(avg);
  el.style.color = gradeColor(avg);
}

/* ══════════════════════════════════
   FIELD UPDATES
══════════════════════════════════ */
function updateEvalField(ramoId, evalId, field, val) {
  const ev = ramos.find(r=>r.id===ramoId)?.evals.find(e=>e.id===evalId);
  if (ev) ev[field] = val;
}
function updateEvalPct(ramoId, evalId, val) {
  const ramo = ramos.find(r=>r.id===ramoId);
  const ev   = ramo?.evals.find(e=>e.id===evalId);
  if (!ev) return;
  ev.pct = parseFloat(val) || 0;
  if (ev.type === 'grouped') recalcSubPcts(ramoId, evalId);
  recalcPcts(ramoId);
  updateRamoGrade(ramoId);
}
function updateEvalGrade(ramoId, evalId, val) {
  const ev = ramos.find(r=>r.id===ramoId)?.evals.find(e=>e.id===evalId);
  if (!ev) return;
  const n = parseFloat(val);
  ev.grade = isNaN(n) ? null : clamp(n, 10, 70);
  updateRamoGrade(ramoId);
}
function updateSubField(ramoId, evalId, subId, field, val) {
  const sub = ramos.find(r=>r.id===ramoId)?.evals.find(e=>e.id===evalId)?.subs.find(s=>s.id===subId);
  if (sub) sub[field] = val;
}
function updateSubGrade(ramoId, evalId, subId, val) {
  const ev  = ramos.find(r=>r.id===ramoId)?.evals.find(e=>e.id===evalId);
  const sub = ev?.subs.find(s=>s.id===subId);
  if (!sub) return;
  const n = parseFloat(val);
  sub.grade = isNaN(n) ? null : clamp(n, 10, 70);
  updateGroupAvg(ramoId, evalId);
  updateRamoGrade(ramoId);
}

function recalcPcts(ramoId) {
  const ramo = ramos.find(r=>r.id===ramoId);
  if (!ramo) return;
  const total = ramo.evals.reduce((s,e)=>s+(e.pct||0),0);
  const warn  = document.getElementById(`pct-warn-${ramoId}`);
  if (!warn) return;
  const diff = Math.abs(total - 100);
  if (ramo.evals.length === 0) { warn.className='pct-warning'; return; }
  if (diff < 0.01) {
    warn.className='pct-warning ok show';
    warn.innerHTML=`✓ Los porcentajes suman exactamente 100%`;
  } else if (total > 100) {
    warn.className='pct-warning over show';
    warn.innerHTML=`⚠ Suman ${fmt1(total)}% — exceden 100% en ${fmt1(total-100)}%`;
  } else if (total > 0) {
    warn.className='pct-warning under show';
    warn.innerHTML=`◉ Suman ${fmt1(total)}% — faltan ${fmt1(100-total)}% por asignar`;
  } else {
    warn.className='pct-warning';
  }
}

/* ══════════════════════════════════
   GRADE CALCULATION
   - Parcial: sólo evalúa las notas ingresadas
   - Real: notas faltantes cuentan como 0
══════════════════════════════════ */
function getEvalGrades(ev) {
  // returns { partial: grade|null, real: grade (0 if missing), hasPct: bool }
  const pct = ev.pct || 0;
  if (ev.type === 'simple') {
    return {
      partial: ev.grade !== null ? ev.grade : null,
      real:    ev.grade !== null ? ev.grade : 0,
      pct
    };
  } else {
    // grouped
    const n = ev.subs.length;
    if (n === 0) return { partial: null, real: 0, pct };
    const partialSubs = ev.subs.filter(s => s.grade !== null);
    const partial = partialSubs.length > 0
      ? partialSubs.reduce((a,s)=>a+s.grade,0)/partialSubs.length
      : null;
    // real: missing subs count as 0
    const real = ev.subs.reduce((a,s)=>a+(s.grade !== null ? s.grade : 0),0)/n;
    return { partial, real, pct };
  }
}

function calcRamoGrades(ramo) {
  let wPartial=0, pctPartial=0, wReal=0, pctReal=0;
  ramo.evals.forEach(ev => {
    const { partial, real, pct } = getEvalGrades(ev);
    if (pct > 0) {
      if (partial !== null) { wPartial += partial * pct; pctPartial += pct; }
      wReal += real * pct; pctReal += pct;
    }
  });
  return {
    partial: pctPartial > 0 ? wPartial/pctPartial : null,
    real:    pctReal    > 0 ? wReal/pctReal        : null
  };
}

function updateRamoGrade(ramoId) {
  const ramo  = ramos.find(r=>r.id===ramoId);
  if (!ramo) return;
  const { partial, real } = calcRamoGrades(ramo);

  const badge    = document.getElementById(`ramo-badge-${ramoId}`);
  const realSpan = document.getElementById(`ramo-real-${ramoId}`);
  const card     = document.getElementById(`ramo-${ramoId}`);
  if (!badge || !card) return;

  if (partial === null && real === null) {
    badge.textContent = '—';
    badge.className   = 'ramo-grade-badge grade-none';
    if (realSpan) realSpan.textContent = '';
    card.className = 'ramo-card';
  } else {
    const shown = partial !== null ? partial : real;
    badge.textContent = fmt1(shown);
    const cls = shown >= 55 ? 'grade-pass' : shown >= 40 ? 'grade-warn' : 'grade-fail';
    badge.className   = `ramo-grade-badge ${cls}`;
    card.className    = `ramo-card ${shown >= 55 ? 'pass-card' : shown >= 40 ? 'warn-card' : 'fail-card'}`;

    if (realSpan) {
      if (real !== null) {
        realSpan.textContent = `Real: ${fmt1(real)}`;
        realSpan.style.background = real >= 55 ? 'var(--green-light)' : real >= 40 ? 'var(--yellow-light)' : 'var(--red-light)';
        realSpan.style.color      = real >= 55 ? 'var(--green)' : real >= 40 ? 'var(--yellow)' : 'var(--red)';
      } else {
        realSpan.textContent = '';
      }
    }
  }
  updateSidebar();
}

/* ══════════════════════════════════
   SIDEBAR
══════════════════════════════════ */
function updateSidebar() {
  const totalCredits = ramos.reduce((s,r)=>s+(parseInt(r.credits)||0),0);
  const credEl = document.getElementById('total-credits');
  if (credEl) credEl.textContent = totalCredits;
  const mCredEl = document.getElementById('m-credits');
  if (mCredEl) mCredEl.textContent = totalCredits;

  // weighted across ramos (partial)
  let wP=0, wR=0, cP=0, cR=0;
  ramos.forEach(r => {
    const { partial, real } = calcRamoGrades(r);
    const cred = parseInt(r.credits)||0;
    if (cred > 0) {
      if (partial !== null) { wP += partial*cred; cP += cred; }
      if (real    !== null) { wR += real*cred;    cR += cred; }
    }
  });

  const promEl   = document.getElementById('prom-ponderado');
  const promCard = document.getElementById('prom-ponderado-card');
  const promReal = document.getElementById('prom-real-sidebar');
  const mProm    = document.getElementById('m-prom');

  if (cP === 0 && cR === 0) {
    if (promEl)   promEl.textContent   = '—';
    if (promCard) promCard.className   = 'prom-card';
    if (promReal) promReal.textContent = '';
    if (mProm)    mProm.textContent    = '—';
  } else {
    const prom     = cP > 0 ? wP/cP : wR/cR;
    const promRealV= cR > 0 ? wR/cR : null;
    if (promEl)   promEl.textContent = fmt1(prom);
    if (promCard) promCard.className = `prom-card ${prom>=55?'pass':prom>=40?'warn':'fail'}`;
    if (mProm)    mProm.textContent  = fmt1(prom);
    if (promReal && promRealV !== null)
      promReal.textContent = `Real: ${fmt1(promRealV)}`;
  }

  const list = document.getElementById('sidebar-list');
  if (!list) return;
  list.innerHTML = '';
  if (ramos.length === 0) {
    list.innerHTML = '<div class="empty-state" style="padding:12px;font-size:12px;">Sin ramos aún</div>';
    return;
  }
  ramos.forEach(r => {
    const { partial, real } = calcRamoGrades(r);
    const shown = partial ?? real;
    const cls   = shown===null ? 'grade-none' : shown>=55 ? 'grade-pass' : shown>=40 ? 'grade-warn' : 'grade-fail';
    const realCls = real===null ? '' : real>=55 ? 'grade-pass' : real>=40 ? 'grade-warn' : 'grade-fail';
    const div = document.createElement('div');
    div.className = 'sidebar-ramo';
    div.onclick = () => document.getElementById(`ramo-${r.id}`)?.scrollIntoView({behavior:'smooth',block:'start'});
    div.innerHTML = `
      <span class="sr-name">${esc(r.name) || `Ramo ${r.id}`}</span>
      <div class="sr-grades">
        <span class="ramo-grade ${cls}">${shown!==null ? fmt1(shown) : '—'}</span>
        ${real!==null ? `<span class="real-grade ${realCls}">Real: ${fmt1(real)}</span>` : ''}
      </div>`;
    list.appendChild(div);
  });
}

/* ══════════════════════════════════
   HELPERS
══════════════════════════════════ */
function fmt1(n)        { return (Math.round(n*10)/10).toFixed(1); }
function clamp(n,a,b)   { return Math.max(a,Math.min(b,n)); }
function gradeColor(n)  { return n>=55?'var(--green)':n>=40?'var(--yellow)':'var(--red)'; }
function esc(s)         { return String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
</script>

</html>
